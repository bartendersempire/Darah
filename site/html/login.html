<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/log.css">
</head>

<body>

<h1 class="titulo">
    Faça login com sua senha e o captcha para entrar neste site
</h1>

<div id="login">
    <form onsubmit="verificarSenha(event)">

        <div class="box">
            <p>Entre com a senha</p>

            <input id="senha" class="senha" type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                placeholder="Digite a senha... (dica a aniversario de namoro sem barras)">

            <button type="submit" class="entrar">
                <b>Entrar</b>
            </button>
        </div>

    </form>
</div>

<div id="captcha" style="display:none;">
</div>

    <button onclick="verificarCaptcha()" class="validar">
        <b>Validar</b>
    </button>
</div>

<script src="../js/logjs.js"></script>

</body>
</html>
